name: Mock Work Item
description: Track a high-fidelity mock task before implementation starts.
title: "[Mock] "
labels:
  - mock
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What problem or mock quality gap does this issue cover?
      placeholder: Define the work in one clear paragraph.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What screens, content, or interaction states are included?
      placeholder: List the exact surfaces or data to update.
    validations:
      required: true

  - type: textarea
    id: identity
    attributes:
      label: Identity Check
      description: Explain how this work supports the text-first discussion product and avoids image-first or commerce-first drift.
      placeholder: |
        Answer these questions:
        - How does this help users understand or debate the post more clearly?
        - Does it keep text as the main content?
        - Does it risk making the app feel like a lookbook, shopping surface, or visual-consumption feed?
        - If imagery is involved, how is it supporting judgment instead of replacing it?
    validations:
      required: true

  - type: input
    id: handoff
    attributes:
      label: Meeting Handoff Doc
      description: If this issue comes from a product/review meeting, link the relevant doc in `docs/`. Leave `N/A` if no separate handoff doc is needed.
      placeholder: docs/<topic>-meeting-handoff.md or N/A
    validations:
      required: true

  - type: textarea
    id: completion
    attributes:
      label: Completion Criteria
      description: What must be true before this issue is done?
      placeholder: Add a concrete checklist.
    validations:
      required: true

  - type: input
    id: branch
    attributes:
      label: Expected Branch Name
      placeholder: feat/<issue-slug> or chore/<issue-slug>
    validations:
      required: true

  - type: checkboxes
    id: guardrails
    attributes:
      label: Identity Guardrails
      description: Confirm the work was framed against the current product identity.
      options:
        - label: This issue treats AI Fashion Forum as a text-first fashion discussion platform
          required: true
        - label: This issue does not make images, product cards, or previews the main content by default
          required: true
        - label: This issue avoids commerce-heavy, lookbook-like, or mock-explanatory UI drift
          required: true
