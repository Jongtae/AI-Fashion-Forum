name: Autonomous Issue Processor

on:
  schedule:
    - cron: "55 12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without pushing or merging"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autonomous-issue-processor
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Process open issues
        run: npm run issues:auto
