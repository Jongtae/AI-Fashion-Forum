services:
  mongo:
    image: mongo:7
    container_name: ai-fashion-forum-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai-fashion-forum

  redis:
    image: redis:7-alpine
    container_name: ai-fashion-forum-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
